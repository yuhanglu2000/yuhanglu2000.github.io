hero:
  bio: >-
    I am a first-year Ph.D. student at [HKU MMLab](https://mmlab.hk/), co-advised
    by Prof. [Hongyang Li](https://lihongyang.info/) and Prof.
    [Bin Chen](https://www.arch.hku.hk/staff/dla/chen-bin/). Before joining HKU,
    I worked as a Research Assistant at [4DVLab](https://4dvlab.github.io/) with
    Prof. [Yuexin Ma](https://yuexinma.me/), collaborating closely with Dr.
    [Xinge Zhu](https://xingezhu.me/). I received my B.Sc. with first-class
    honours from the dual-degree program between
    [Beijing University of Posts and Telecommunications](https://www.bupt.edu.cn/)
    and [Queen Mary University of London](https://www.qmul.ac.uk/).
  research_interest: >-
    My current research focuses on Physical AI, especially embodied intelligence
    and video generation. More broadly, I am interested in how machines can
    build reliable world understanding from visual and 3D observations, with
    strong generalization, interpretability, and evolvability.
  portrait: /images/profile_photo.jpg
